<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヒロ式 v24 判定</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}
.container{
  width:90%;
  margin:auto;
}
textarea{
  width:100%;
  height:120px;
  margin:10px 0;
  background:#222;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px;
}
button{
  width:80%;
  padding:15px;
  margin:10px;
  font-size:18px;
  background:#c9a74d;
  color:#000;
  border:none;
  border-radius:10px;
}
.result{
  font-size:22px;
  margin-top:20px;
}
.small{
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>ヒロ式 v24 最終判定</h1>

<p>v23の結果を貼る👇</p>
<textarea id="input"></textarea>

<button onclick="analyze()">判定する</button>

<div class="result" id="result"></div>
<div class="small" id="detail"></div>

</div>

<script>
function analyze(){
  let text = document.getElementById("input").value;

  let score = 0;
  let detail = [];

  // スコア判定
  if(text.includes("スコア:7") || text.includes("スコア:8")){
    score += 2;
    detail.push("スコア強");
  }
  else if(text.includes("スコア:5") || text.includes("スコア:6")){
    score += 1;
    detail.push("スコア中");
  }

  // 軸の強さ
  if(text.includes("◎軸")){
    score += 2;
    detail.push("軸強");
  }

  // 兄弟ゾーン
  if(text.includes("兄弟")){
    score += 1;
    detail.push("兄弟連動");
  }

  // 連鎖
  if(text.includes("連鎖")){
    score += 1;
    detail.push("連鎖あり");
  }

  // B群
  if(text.includes("B群")){
    score += 1;
    detail.push("B群要素");
  }

  // 折り（強化）
  if(text.includes("折り")){
    score += 2;
    detail.push("折り成立");
  }

  // 10Rリンク（重要）
  if(text.includes("10R")){
    score += 2;
    detail.push("10R連動");
  }

  // 人気リスク
  if(text.includes("人気集中")){
    score -= 2;
    detail.push("人気リスク");
  }

  // ===== 12R補正 =====
  if(text.includes("12R")){
    score += 1;
    detail.push("最終R補正");
  }

  if(text.includes("継続")){
    score += 1;
    detail.push("継続強");
  }

  if(text.includes("逆転")){
    score -= 1;
    detail.push("逆転リスク");
  }

  // ===== 最終判定 =====
  let result = "";

  if(score >= 6){
    result = "🔥 強気BOX";
  }else if(score >= 3){
    result = "△ 押さえ";
  }else{
    result = "❌ 見送り";
  }

  document.getElementById("result").innerText = result + "（スコア:" + score + "）";
  document.getElementById("detail").innerText = "要素: " + detail.join(" / ");
}
</script>

</body>
</html>
